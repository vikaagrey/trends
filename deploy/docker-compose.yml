services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      start_period: 20s
      interval: 5s
      timeout: 10s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "1", "30", "-b", "localhost:9092"]
      start_period: 30s
      interval: 10s
      timeout: 15s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trends
      POSTGRES_PASSWORD: trends
      POSTGRES_DB: trends
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trends -d trends"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  trends:
    image: trends:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: search.events
      KAFKA_GROUP_ID: trends-service
      POSTGRES_DSN: postgres://trends:trends@postgres:5432/trends?sslmode=disable
      REDIS_URL: redis://redis:6379
      REQUEST_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s

volumes:
  pgdata:
